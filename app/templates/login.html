<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — EduSecure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Fondos 3D -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particle-layer" aria-hidden="true">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="login-page" role="main">
    <div class="login-box">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-circle" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <h1>EduSecure</h1>
        <p>Sistema de Gestión Académica</p>
      </div>

      <!-- Card -->
      <div class="glass-card">
        <div class="card-header-3d primary">
          <h4>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Acceso al sistema
          </h4>
        </div>

        <div class="card-body-3d">

          <!-- Error -->
          {% if error %}
          <div class="alert-3d alert-danger-3d" role="alert" style="margin-bottom:1.25rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            {{ error }}
          </div>
          {% endif %}

          <!-- Formulario -->
          <form method="POST" action="{{ url_for('login') }}" id="loginForm" novalidate>

            <div class="input-group-3d">
              <label for="username">Usuario</label>
              <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                <input
                  type="text"
                  class="form-input"
                  id="username"
                  name="username"
                  placeholder="Ingresa tu usuario"
                  required
                  autocomplete="username"
                  aria-label="Nombre de usuario"
                />
              </div>
            </div>

            <div class="input-group-3d">
              <label for="password">Contraseña</label>
              <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input
                  type="password"
                  class="form-input"
                  id="password"
                  name="password"
                  placeholder="••••••••••"
                  required
                  autocomplete="current-password"
                  aria-label="Contraseña"
                />
              </div>
            </div>

            <button type="submit" class="btn-3d btn-primary-3d w-full" id="btnLogin" style="margin-top:0.5rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              Iniciar sesión
            </button>

          </form>

          <!-- Chip demo -->
          <div class="demo-chip" role="note" aria-label="Credenciales de demostración">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Demo:&nbsp;<code>admin</code>&nbsp;/&nbsp;<code>admin123</code>
          </div>

        </div>
      </div>

      <!-- Footer mini -->
      <p style="text-align:center; margin-top:1.5rem; font-size:0.75rem; color:var(--clr-text-muted);">
        Protegido contra SQL Injection &bull; XSS &bull; OWASP A01
      </p>

    </div>
  </div>

</body>
</html>

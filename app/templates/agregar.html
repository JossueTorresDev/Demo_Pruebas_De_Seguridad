{% extends "base.html" %}
{% block title %}Agregar Estudiante{% endblock %}

{% block content %}

<!-- Page header -->
<div class="page-header">
  <div class="page-title">
    <div class="title-icon" style="background:linear-gradient(135deg,var(--clr-success),var(--clr-accent-3));" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a0e27" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
      </svg>
    </div>
    <div>
      <h2>Nuevo Estudiante</h2>
      <p class="text-muted-3d">Completa el formulario para registrar</p>
    </div>
  </div>
  <a href="{{ url_for('index') }}" class="btn-3d btn-ghost-3d" aria-label="Volver al listado">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Volver
  </a>
</div>

<!-- Card formulario -->
<div class="form-section">
  <div class="glass-card">

    <div class="card-header-3d success">
      <h5>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="23" y1="11" x2="17" y2="11"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
        </svg>
        Datos del Estudiante
      </h5>
    </div>

    <div class="card-body-3d">
      <form method="POST" action="{{ url_for('agregar') }}" id="formAgregar" novalidate>

        <!-- Nombre -->
        <div class="input-group-3d">
          <label for="nombre">Nombre completo</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              class="form-input"
              id="nombre"
              name="nombre"
              placeholder="Ej. Ana García López"
              required
              maxlength="100"
              aria-label="Nombre completo del estudiante"
            />
          </div>
        </div>

        <!-- Carnet y Nota en fila -->
        <div class="form-row-2">

          <div class="input-group-3d">
            <label for="carnet">Carnet</label>
            <div class="input-wrap">
              <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <line x1="8" y1="10" x2="8" y2="10"/>
                <line x1="12" y1="10" x2="16" y2="10"/>
                <line x1="8" y1="14" x2="8" y2="14"/>
                <line x1="12" y1="14" x2="16" y2="14"/>
              </svg>
              <input
                type="text"
                class="form-input"
                id="carnet"
                name="carnet"
                placeholder="Ej. 2024-001"
                required
                maxlength="20"
                aria-label="Número de carnet"
              />
            </div>
          </div>

          <div class="input-group-3d">
            <label for="nota">Nota <span style="color:var(--clr-text-muted); font-weight:400;">(0 – 10)</span></label>
            <div class="input-wrap">
              <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              <input
                type="number"
                class="form-input"
                id="nota"
                name="nota"
                min="0"
                max="10"
                step="0.1"
                value="0"
                required
                aria-label="Nota del estudiante del 0 al 10"
              />
            </div>
          </div>

        </div>

        <hr class="divider" />

        <!-- Acciones -->
        <div class="gap-3d">
          <button type="submit" class="btn-3d btn-success-3d" id="btnGuardar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            Guardar estudiante
          </button>
          <a href="{{ url_for('index') }}" class="btn-3d btn-ghost-3d" aria-label="Cancelar y volver">
            Cancelar
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

{% endblock %}
